name: SentinelX Production Build Pipeline

on:
  push:
    branches:
      - main  # Triggers the build every time you push code to the main branch
  workflow_dispatch: # Allows you to manually trigger the build via the GitHub UI button

jobs:
  compile-android:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clone Repository Source
        uses: actions/checkout@v4

      - name: 2. Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 3. Install NPM Dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: 4. Unpack Expo Core to Native Android Source
        run: npx expo prebuild --clean --platform android

      - name: 5. Provision Enterprise JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: 6. Mount and Verify Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: 7. Validate and Execute Native Gradle Compilation
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 8. Archive and Upload Finished Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinelx-demo-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 3 # Keeps the download link active for 3 days